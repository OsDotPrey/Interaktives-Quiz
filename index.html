<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 40px;
      background-color: azure;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background-color: blueviolet;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card" id="content">
    <h2> Kurzes interaktives Quiz </h2>
    <p>Cyberangriffe auf Flughäfen</p>
    <button onclick="next()">Start</button> 
  </div>

  <script>
    let step=0;

function next() {
  step++;

  if (step ===1) {
    document.getElementById("content").innerHTML= `
    <h3>Frage 1</h3>
    <p>Welches Glied stellt den größten Schwachpunkt dar?</p>
    <button onclick="next()">Patrick</button>
    <button onclick="next()">Alle anderen</button>
    `;
  }
  else if (step ===2) {
    document.getElementById("content").innerHTML= `
    <h3>Frage 1</h3>
    <p>Hat euch der Vortrag gefallen?</p>
    <button onclick="next()">Jaaaa</button>
    <button onclick="next()">Neeee</button>
    `;
  }
  else {
    document.getElementById("content").innerHTML= `
    <h3>WARNUNG!</h3>
    <p>Sie wurden gerade eben rickrolled!</p>
    <p>Was würde ihr Chef von ihnen denken?</p>
    <p>Sie haben:</p>
    <ul style="text-allign: left;">
      <li>mal wieder zu lange auf der Toilette gesessen!</li>
      <li>schon wieder den QR Code gescannt!</li>
      </ul>
      <p><strong>An dieser Stelle könnte ihre Mahnung stehen!</strong></p>
    `;
  }
}
  </script>
  
</body>
</html>
